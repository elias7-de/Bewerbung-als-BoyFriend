<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Date Planner</title>

    <style>
        * {
          box-sizing: border-box;
          font-family: Arial, sans-serif;
        }

        body {
          margin: 0;
          min-height: 100vh;
          background: linear-gradient(135deg, #ffdde1, #ee9ca7);
          display: flex;
          justify-content: center;
          align-items: center;
          color: #333;
        }

        .card {
          background: white;
          width: 90%;
          max-width: 430px;
          padding: 30px;
          border-radius: 25px;
          text-align: center;
          box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
          animation: pop 0.4s ease;
        }

        @keyframes pop {
          from {
            transform: scale(0.9);
            opacity: 0;
          }
          to {
            transform: scale(1);
            opacity: 1;
          }
        }

        h1 {
          font-size: 28px;
          margin-bottom: 15px;
        }

        p {
          font-size: 16px;
          color: #555;
        }

        button {
          border: none;
          padding: 14px 25px;
          margin: 10px;
          border-radius: 30px;
          font-size: 16px;
          cursor: pointer;
          background: #ff5c8a;
          color: white;
          transition: 0.2s;
        }

        button:hover {
          transform: scale(1.05);
          background: #ff3f78;
        }

        input, textarea {
          width: 100%;
          padding: 14px;
          margin-top: 15px;
          border: 2px solid #ffd1dc;
          border-radius: 15px;
          font-size: 16px;
          outline: none;
        }

        textarea {
          height: 120px;
          resize: none;
        }

        .hidden {
          display: none;
        }

        .heart {
          font-size: 45px;
          animation: beat 1s infinite;
        }

        @keyframes beat {
          0%, 100% {
            transform: scale(1);
          }
          50% {
            transform: scale(1.2);
          }
        }

        .summary {
          text-align: left;
          background: #fff0f5;
          padding: 15px;
          border-radius: 15px;
          margin-top: 20px;
        }
        @media (max-width: 600px) {
  body {
    padding: 18px;
    align-items: center;
  }

  .card {
    width: 100%;
    max-width: 360px;
    padding: 24px 20px;
    border-radius: 24px;
  }

  h1 {
    font-size: 24px;
    line-height: 1.25;
  }

  p {
    font-size: 15px;
  }

  button {
    width: 100%;
    margin: 8px 0;
    padding: 15px 20px;
    font-size: 16px;
  }

  input,
  textarea {
    font-size: 16px;
    padding: 15px;
  }

  textarea {
    height: 130px;
  }

  .heart {
    font-size: 42px;
  }

  .summary {
    font-size: 15px;
  }
}
    </style>
</head>

<body>

<div class="card" id="step1">
    <div class="heart">❤️</div>
    <h1>Would you like to go on a date with me?</h1>
    <button onclick="goToStep(2)">Yes</button>
    <button onclick="goToStep(2)">Yes</button>
</div>

<div class="card hidden" id="step2">
    <h1>Yay! When are you free? 😊</h1>
    <input type="date" id="date" />
    <input type="time" id="time" />
    <button onclick="saveDateTime()">Next</button>
</div>

<div class="card hidden" id="step3">
    <h1>If we go on our first date, what would you like us to do? ✨</h1>
    <textarea id="idea" placeholder="Tell me what sounds fun 😊"></textarea>
    <button onclick="showSummary()">Finish</button>
</div>

<div class="card hidden" id="step4">
    <div class="heart">💖</div>
    <h1>Perfect!</h1>
    <p>I can't wait ❤️</p>

    <div class="summary">
        <p><strong>Date:</strong> <span id="finalDate"></span></p>
        <p><strong>Time:</strong> <span id="finalTime"></span></p>
        <p><strong>Her idea:</strong> <span id="finalIdea"></span></p>
    </div>

    <form action="https://formspree.io/f/mdaryjqq" method="POST">
        <input type="hidden" name="date" id="formDate">
        <input type="hidden" name="time" id="formTime">
        <input type="hidden" name="idea" id="formIdea">
        <input type="hidden" name="_subject" value="❤️ She accepted your date invitation!">

        <button type="submit">Send ❤️</button>
    </form>
</div>
<script>
    let selectedDate = "";
    let selectedTime = "";

    function goToStep(stepNumber) {
      document.querySelectorAll(".card").forEach(card => {
        card.classList.add("hidden");
      });

      document.getElementById("step" + stepNumber).classList.remove("hidden");
    }

    function saveDateTime() {
      selectedDate = document.getElementById("date").value;
      selectedTime = document.getElementById("time").value;

      if (!selectedDate || !selectedTime) {
        alert("Please choose a date and time 😊");
        return;
      }

      goToStep(3);
    }

    function showSummary() {
      const idea = document.getElementById("idea").value;

      if (!idea.trim()) {
        alert("Write what sounds fun to you 😊");
        return;
      }

      document.getElementById("finalDate").textContent = selectedDate;
      document.getElementById("finalTime").textContent = selectedTime;
      document.getElementById("finalIdea").textContent = idea;


      document.getElementById("formDate").value = selectedDate;
      document.getElementById("formTime").value = selectedTime;
      document.getElementById("formIdea").value = idea;

      goToStep(4);
    }

    function copyPlan() {
      const idea = document.getElementById("idea").value;

      const text = `Our first date plan ❤️
Date: ${selectedDate}
Time: ${selectedTime}
Idea: ${idea}`;

      navigator.clipboard.writeText(text);
      alert("Plan copied ❤️");
    }
</script>

</body>
</html>
